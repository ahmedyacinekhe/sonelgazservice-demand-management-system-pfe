<app-navbar></app-navbar>

<div class="container mt-4">
  <h4 class="fw-bold mb-4">📣 Nouvelle Réclamation</h4>

  <div class="card shadow p-4">
    <div class="card-body">

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea 
          class="form-control" 
          rows="4" 
          placeholder="Décrivez votre réclamation..."
          [(ngModel)]="reclamation.description">
        </textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Type de réclamation</label>
        <select class="form-control" [(ngModel)]="reclamation.typeReclamation">
          <option value="">-- Choisir --</option>
          <option value="TECHNIQUE">Technique</option>
          <option value="ADMINISTRATIVE">Administrative</option>
          <option value="SALAIRE">Salaire</option>
          <option value="AUTRE">Autre</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Niveau d'urgence</label>
        <select class="form-control" [(ngModel)]="reclamation.niveauUrgence">
          <option value="">-- Choisir --</option>
          <option value="FAIBLE">Faible</option>
          <option value="MOYEN">Moyen</option>
          <option value="URGENT">Urgent</option>
        </select>
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

      <button class="btn w-100 text-white" style="background-color: #de7b3b;" 
        (click)="submit()" [disabled]="loading">
        {{ loading ? 'Envoi...' : 'Soumettre la réclamation' }}
      </button>

    </div>
  </div>
</div>
